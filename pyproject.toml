[project]
name = "hakodesk"
version = "0.1.0"
description = "HakoDesk GUI Application"
requires-python = ">=3.9"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pyhako",
    "python-multipart",
    "aiofiles",
    "keyring",
    "tk>=0.1.0",
]

[tool.uv.sources]
pyhako = { git = "https://github.com/xtorker/PyHako.git", tag = "v0.1.0" }

# Development server configuration
# Run with: uv run uvicorn backend.main:app --port 8000 --reload --reload-exclude "output/*" --reload-exclude "auth_data/*"
