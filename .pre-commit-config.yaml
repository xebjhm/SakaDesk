# Pre-commit hooks for SakaDesk
# Install: uv run pre-commit install && uv run pre-commit install --hook-type pre-push
# Run all: uv run pre-commit run --all-files

default_stages: [pre-commit]

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: '__snapshots__/'
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # Python: ruff lint + format (fast, replaces flake8/isort/black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Python: mypy type checking (pre-push only — needs full project context)
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: uv run python -m mypy backend/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

  # Frontend: TypeScript compilation check (pre-push only)
  - repo: local
    hooks:
      - id: tsc
        name: tsc --noEmit
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
        stages: [pre-push]

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 20'
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
        stages: [pre-push]
