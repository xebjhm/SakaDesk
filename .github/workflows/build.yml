name: Build Windows Exe

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Also checkout pyhako since it's a dependency
    - name: Checkout pyhako
      uses: actions/checkout@v4
      with:
        repository: xtorker/PyHako
        path: PyHako

    # 1. Setup Node & Build Frontend
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: |
        npm run test:run

    # 2. Setup Python and uv
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    # 3. Install Python Deps with uv
    - name: Install Dependencies
      run: |
        # Sync project dependencies
        uv sync

        # Install build tools
        uv add --dev pyinstaller pywebview playwright

        # Verify installations
        uv run python -c "import fastapi; print('FastAPI OK:', fastapi.__file__)"
        uv run python -c "import uvicorn; print('Uvicorn OK:', uvicorn.__file__)"
        uv run python -c "import pyhako; print('pyhako OK:', pyhako.__file__)"
        uv run python -c "import keyring; print('Keyring OK:', keyring.__file__)"

    # 4. Run Tests with Coverage
    - name: Run Tests with Coverage
      run: |
        uv run pytest -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=50

    # 5. Type Check with mypy
    - name: Type Check with mypy
      run: |
        uv run mypy backend/

    # 6. Setup Inno Setup
    - name: Install Inno Setup
      run: choco install innosetup

    # 7. Build EXE & Installer
    - name: Build with PyInstaller & Inno Setup
      run: |
        uv run python tooling/windows/build_windows.py

    # 8. Upload Installer
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hakodesk-setup
        path: dist/hakodesk-setup.exe
