name: Build Windows Exe

on:
  push:
    branches: [main, dev]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Setup Node & Build Frontend
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: |
        npm run test:run

    # E2E tests require a running backend with uv+Python — run after Python setup
    # (Playwright browser install and E2E step moved to after backend tests)

    # 2. Setup Python and uv
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    # 3. Install Python Deps with uv (using PyPI pyzaka)
    - name: Install Dependencies
      run: |
        # Sync project dependencies (ignore local sources, use PyPI)
        uv sync --no-sources

        # Install build tools into the venv
        uv pip install pyinstaller pywebview playwright

        # Verify installations
        uv run --no-sources python -c "import fastapi; print('FastAPI OK:', fastapi.__file__)"
        uv run --no-sources python -c "import uvicorn; print('Uvicorn OK:', uvicorn.__file__)"
        uv run --no-sources python -c "import pyzaka; print('pyzaka OK:', pyzaka.__file__)"
        uv run --no-sources python -c "import keyring; print('Keyring OK:', keyring.__file__)"

    # 4. Run Tests with Coverage
    - name: Run Tests with Coverage
      run: |
        uv run --no-sources pytest -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=20 --ignore=tests/test_startup.py -k "not test_get_group_messages and not test_get_messages_by_path"

    # 5. Type Check with mypy
    - name: Type Check with mypy
      continue-on-error: true
      run: |
        uv run --no-sources mypy backend/

    # 6. E2E Tests (needs both frontend build and Python/uv)
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install chromium --with-deps

    - name: Run E2E Tests
      working-directory: ./frontend
      run: npm run test:e2e
      continue-on-error: true
      env:
        ZAKADESK_TEST_MODE: 'true'

    # 8. Setup Inno Setup
    - name: Install Inno Setup
      run: choco install innosetup

    # 9. Extract version from pyproject.toml
    - name: Extract Version
      id: version
      run: |
        $version = (uv run --no-sources python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Extracted version: $version"

    # 10. Build EXE & Installer
    - name: Build with PyInstaller & Inno Setup
      run: |
        uv run --no-sources python tooling/windows/build_windows.py

    # 11. Upload Installer as artifact (always, for dev builds too)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZakaDesk-${{ steps.version.outputs.VERSION }}-Setup
        path: dist/ZakaDesk-${{ steps.version.outputs.VERSION }}-Setup.exe

    # 12. Create GitHub Release (only on version tags)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ github.ref_name }}" `
          "dist/ZakaDesk-${{ steps.version.outputs.VERSION }}-Setup.exe" `
          --title "ZakaDesk ${{ steps.version.outputs.VERSION }}" `
          --generate-notes
