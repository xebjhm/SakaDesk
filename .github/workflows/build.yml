name: CI

on:
  push:
    branches: [main, dev]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Python linting
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install Dependencies
      run: uv sync --no-sources

    - name: Lint with ruff
      run: uv run --no-sources ruff check .

    - name: Type Check with mypy
      run: uv run --no-sources mypy backend/

    # Frontend linting
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install Dependencies
      run: uv sync --no-sources

    - name: Run Tests with Coverage
      run: |
        uv run --no-sources pytest -v --tb=short \
          --cov=backend --cov-report=term-missing --cov-fail-under=50 \
          --ignore=tests/test_startup.py

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Tests with Coverage
      working-directory: ./frontend
      run: npm run test:coverage

  build:
    needs: [lint, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Frontend build
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    # Python setup
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install Dependencies
      run: |
        uv sync --no-sources
        uv pip install pyinstaller pywebview

    # Build
    - name: Install Inno Setup
      run: choco install innosetup

    - name: Extract Version
      id: version
      run: |
        $version = (uv run --no-sources python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Build with PyInstaller & Inno Setup
      run: uv run --no-sources python tooling/windows/build_windows.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SakaDesk-${{ steps.version.outputs.VERSION }}-Setup
        path: dist/SakaDesk-${{ steps.version.outputs.VERSION }}-Setup.exe

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        pattern: SakaDesk-*-Setup

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "$GITHUB_REF_NAME" \
          SakaDesk-*-Setup/*.exe \
          --title "SakaDesk $(echo $GITHUB_REF_NAME | sed 's/^v//')" \
          --generate-notes
